<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object Detail</title>
<link rel="stylesheet" href="./css/style.css" />

  <script type="importmap">

        "GLTFLoader": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",

<body>

    <a href="./index.html">← back</a>

    <dt>Site / Contact</dt>

      Created and managed by Issei Kouda.<br>
      <a href="mailto:Issei.kouda@icloud.com">Issei.kouda@icloud.com</a>

  <a id="downloadButton" class="download-button" href="" download>

  </main>
